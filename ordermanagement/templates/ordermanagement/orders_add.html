{% extends 'base.html' %}

{% block content %}

<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #f4f6f9;
    }

    .form-container {
        width: 400px;
        margin: 60px auto;
        background: #ffffff;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    h1 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
    }

    form p {
        margin-bottom: 15px;
    }

    input, select, textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 6px;
        margin-top: 5px;
        font-size: 14px;
    }

    input:focus, select:focus, textarea:focus {
        outline: none;
        border-color: #007bff;
    }

    .submit-btn {
        width: 100%;
        background: #007bff;
        color: white;
        padding: 10px;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
        margin-top: 10px;
    }

    .submit-btn:hover {
        background: #0056b3;
    }
</style>

<div class="form-container">
    <h1>Add Order</h1>

    <form action="" method="POST">
        {% csrf_token %}
        
        {{ orders_form.as_p }}

        <button type="submit" class="submit-btn">Submit Order</button>
    </form>
</div>

{% endblock %}
