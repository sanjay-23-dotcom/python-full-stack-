{% extends 'base.html' %}

{% block content %}
<!DOCTYPE html>
<html>
<head>
    <title>Customer Form</title>

    <!-- Bootstrap (optional but looks good) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <!-- Heading -->
    <h2 class="mb-4 text-center">
        {% if is_update %}
            Update Customer
        {% else %}
            Add Customer
        {% endif %}
    </h2>

    <!-- Form -->
    <div class="card p-4 shadow">
        <form method="POST">
            {% csrf_token %}

            <!-- Form fields -->
            <div class="mb-3">
                <label class="form-label">Customer Name</label>
                {{ customer_form.customer_name }}
            </div>

            <div class="mb-3">
                <label class="form-label">Customer Since</label>
                {{ customer_form.customer_since }}
            </div>

            <!-- Submit button -->
            <button type="submit" class="btn btn-primary w-100">
                {% if is_update %}
                    Update
                {% else %}
                    Add
                {% endif %}
            </button>
        </form>
    </div>

    <!-- Back button -->
    <div class="text-center mt-3">
        <a href="{% url 'customer_list' %}" class="btn btn-secondary">
            Back to List
        </a>
    </div>

</div>

</body>
</html>

{% endblock %}
