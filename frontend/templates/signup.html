<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    {% load bootstrap5 %}
    {% bootstrap_css %}
    {% bootstrap_javascript %}
</head>
<body>
    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #4facfe, #00f2fe);
            height: 100vh;
        }
        .login-card {
            border-radius: 15px;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow-lg login-card" style="width: 350px;">
        
        <h3 class="text-center mb-4">sign up</h3>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>

            <p class="text-danger fw-bold">{{error}}</p>

             <div class="mb-3">
                <label class="form-label">first_name</label>
                <input type="text" name="firstname" class="form-control" placeholder="Enter username" required>
            </div>

             <div class="mb-3">
                <label class="form-label">last_name</label>
                <input type="text" name="lastname" class="form-control" placeholder="Enter username" required>
            </div>

             <div class="mb-3">
                <label class="form-label">email</label>
                <input type="text" name="email_address" class="form-control" placeholder="Enter username" required>
            </div>

             <div class="mb-3">
                <label class="form-label">age</label>
                <input type="text" name="age" class="form-control" placeholder="Enter username" required>
            </div>

        
            <button type="submit" class="btn btn-primary w-100">submit</button>

        </form>

    </div>
</div>

</body>
</html>
</body>
</html>
